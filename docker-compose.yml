services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehsl-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - vehsl

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehsl-backend
    restart: unless-stopped
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-insecure-secret-key}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vehsl}
      - POSTGRES_USER=${POSTGRES_USER:-vehsl}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vehsl}
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - vehsl

  db:
    image: postgres:16-alpine
    container_name: vehsl-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vehsl}
      - POSTGRES_USER=${POSTGRES_USER:-vehsl}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vehsl}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vehsl

networks:
  vehsl:
    driver: bridge

volumes:
  postgres-data:
