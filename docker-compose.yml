services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    container_name: vehsl-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_SERVER_API_URL=${NEXT_SERVER_API_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vehsl

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
    container_name: vehsl-backend
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
          set -e
          python - <<'PY'
          import os
          import time

          import psycopg

          host = os.environ.get("POSTGRES_HOST", "db")
          port = int(os.environ.get("POSTGRES_PORT", "5432"))
          name = os.environ.get("POSTGRES_DB", "vehsl")
          user = os.environ.get("POSTGRES_USER", "vehsl")
          pw = os.environ.get("POSTGRES_PASSWORD", "vehsl")

          deadline = time.time() + 60
          last = None
          while time.time() < deadline:
              try:
                  psycopg.connect(
                      host=host,
                      port=port,
                      dbname=name,
                      user=user,
                      password=pw,
                      connect_timeout=2,
                  ).close()
                  print("db ready")
                  break
              except Exception as e:
                  last = e
                  time.sleep(1)
          else:
              raise SystemExit(f"db not ready: {last}")
          PY

          if [ "$${RUN_COLLECTSTATIC:-0}" = "1" ]; then
            python manage.py collectstatic --noinput
          fi
          python manage.py migrate --noinput
          python manage.py seed_login_users

          RELOAD_FLAG=""
          if [ "$${GUNICORN_RELOAD:-0}" = "1" ]; then
            RELOAD_FLAG="--reload"
          fi

          exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 60 --access-logfile - --error-logfile - --capture-output --log-level info $$RELOAD_FLAG

    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-insecure-secret-key}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-1}
      - GUNICORN_RELOAD=${GUNICORN_RELOAD:-1}
      - SEED_DEFAULT_PASSWORD=${SEED_DEFAULT_PASSWORD:-Test123!@#}
      - SEED_FORCE_PASSWORD=${SEED_FORCE_PASSWORD:-1}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vehsl}
      - POSTGRES_USER=${POSTGRES_USER:-vehsl}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vehsl}
      - EMAIL_VERIFICATION_CODE_TTL_SECONDS=${EMAIL_VERIFICATION_CODE_TTL_SECONDS:-600}
      - EMAIL_VERIFICATION_TOKEN_TTL_SECONDS=${EMAIL_VERIFICATION_TOKEN_TTL_SECONDS:-1800}
      - EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS=${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:-60}
      - EMAIL_VERIFICATION_MAX_ATTEMPTS=${EMAIL_VERIFICATION_MAX_ATTEMPTS:-5}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-localhost}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-1}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-0}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-no-reply@vehsl.local}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vehsl

  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: vehsl-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vehsl}
      - POSTGRES_USER=${POSTGRES_USER:-vehsl}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vehsl}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - vehsl

networks:
  vehsl:
    driver: bridge

volumes:
  postgres-data:
