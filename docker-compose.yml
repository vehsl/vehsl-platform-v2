services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vehsl-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - vehsl

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vehsl-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    networks:
      - vehsl

networks:
  vehsl:
    driver: bridge
